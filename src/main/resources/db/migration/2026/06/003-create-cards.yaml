databaseChangeLog:
  - changeSet:
      id: 004-create-cards
      author: iplion
      changes:
        - createTable:
            tableName: cards
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: public_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: owner_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cards_owner
                    references: users(id)

              # AES-GCM - ключ задается через переменные окружения CARD_ENCRYPTION_KEY
              - column:
                  name: encrypted_card_number
                  type: TEXT
                  constraints:
                    nullable: false

              # HMAC-SHA256 - уникальный отпечаток номера карты, ключ в переменных окружения CARD_HMAC_KEY
              - column:
                  name: card_number_hash
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: last_four_digits
                  type: VARCHAR(4)
                  constraints:
                    nullable: false

              - column:
                  name: expiration_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: balance
                  type: NUMERIC(19, 2)
                  defaultValueNumeric: 0.00
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - sql:
            sql: >
              CREATE TRIGGER trg_cards_set_updated_at
              BEFORE UPDATE ON cards
              FOR EACH ROW
              EXECUTE FUNCTION set_updated_at();

        - sql:
            sql: >
              ALTER TABLE cards
              ADD CONSTRAINT chk_cards_last_four_digits
              CHECK (last_four_digits ~ '^[0-9]{4}$');

        - sql:
            sql: >
              ALTER TABLE cards
              ADD CONSTRAINT chk_cards_status
              CHECK (status IN ('ACTIVE', 'BLOCKED', 'EXPIRED'));

        - createIndex:
            tableName: cards
            indexName: idx_cards_owner_id
            columns:
              - column:
                  name: owner_id

        - createIndex:
            tableName: cards
            indexName: idx_cards_status
            columns:
              - column:
                  name: status
