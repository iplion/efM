databaseChangeLog:
  - changeSet:
      id: 005-create-card-block-requests
      author: iplion
      changes:
        - createTable:
            tableName: card_block_requests
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: card_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_card_block_requests_card
                    references: cards(id)

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_card_block_requests_user
                    references: users(id)

              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: REQUESTED
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: processed_at
                  type: TIMESTAMP WITH TIME ZONE

              - column:
                  name: processed_by
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_card_block_requests_processed_by
                    references: users(id)

        - sql:
            sql: >
              ALTER TABLE card_block_requests
              ADD CONSTRAINT chk_card_block_requests_status
              CHECK (status IN ('REQUESTED', 'APPROVED', 'REJECTED'));

        - createIndex:
            tableName: card_block_requests
            indexName: idx_card_block_requests_user_id
            columns:
              - column:
                  name: user_id

        - createIndex:
            tableName: card_block_requests
            indexName: idx_card_block_requests_status
            columns:
              - column:
                  name: status

        - createIndex:
            tableName: card_block_requests
            indexName: idx_card_block_requests_created_at
            columns:
              - column:
                  name: created_at
