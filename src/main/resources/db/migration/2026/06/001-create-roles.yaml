databaseChangeLog:
  - changeSet:
      id: 001-create-roles
      author: iplion
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
                    unique: true

        - insert:
            tableName: roles
            columns:
              - column:
                  name: name
                  value: ADMIN

        - insert:
            tableName: roles
            columns:
              - column:
                  name: name
                  value: USER
