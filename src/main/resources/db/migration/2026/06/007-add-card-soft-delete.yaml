databaseChangeLog:
  - changeSet:
      id: 007-add-card-soft-delete
      author: iplion
      changes:
        - addColumn:
            tableName: cards
            columns:
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: deleted_at
                  type: TIMESTAMP WITH TIME ZONE

        - createIndex:
            tableName: cards
            indexName: idx_cards_deleted
            columns:
              - column:
                  name: deleted
