databaseChangeLog:
  - changeSet:
      id: 006-create-transfers
      author: iplion
      changes:
        - addUniqueConstraint:
            tableName: cards
            columnNames: id, owner_id
            constraintName: uk_cards_id_owner

        - createTable:
            tableName: transfers
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: public_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: owner_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_transfers_owner
                    references: users(id)

              - column:
                  name: source_card_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_transfers_source_card
                    references: cards(id)

              - column:
                  name: target_card_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_transfers_target_card
                    references: cards(id)

              - column:
                  name: amount
                  type: NUMERIC(19, 2)
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - sql:
            sql: >
              ALTER TABLE transfers
              ADD CONSTRAINT chk_transfers_status
              CHECK (status IN ('COMPLETED', 'REJECTED'));

        - createIndex:
            tableName: transfers
            indexName: idx_transfers_owner_id
            columns:
              - column:
                  name: owner_id

        - createIndex:
            tableName: transfers
            indexName: idx_transfers_created_at
            columns:
              - column:
                  name: created_at
