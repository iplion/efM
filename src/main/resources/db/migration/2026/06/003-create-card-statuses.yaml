databaseChangeLog:
  - changeSet:
      id: 003-create-card-statuses
      author: iplion
      changes:
        - createTable:
            tableName: card_statuses
            columns:
              - column:
                  name: id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true

        - insert:
            tableName: card_statuses
            columns:
              - column:
                  name: name
                  value: ACTIVE

        - insert:
            tableName: card_statuses
            columns:
              - column:
                  name: name
                  value: BLOCKED

        - insert:
            tableName: card_statuses
            columns:
              - column:
                  name: name
                  value: EXPIRED
